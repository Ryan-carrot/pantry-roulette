<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry Roulette</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <a href="#main-content" class="skip-link">Skip to main content</a>
        <div class="container">
            <header class="hero">
                <h1>
                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    Pantry Roulette
                </h1>
                <p class="subtitle">Spin the wheel. Feed yourself.</p>
            </header>

            <main class="card" id="main-content">
                <div class="input-group">
                    <label for="ingredients">What's in your pantry?</label>
                    <input
                        type="text"
                        id="ingredients"
                        placeholder="e.g. eggs, butter, pasta"
                        autocomplete="off"
                        aria-describedby="ingredients-hint"
                    />
                    <p id="ingredients-hint" class="input-hint">Enter ingredients separated by commas</p>
                </div>

                <div class="input-group">
                    <label for="vibe">What's the vibe?</label>
                    <select id="vibe" aria-label="Select a cooking vibe">
                        <option value="lazy">Lazy</option>
                        <option value="impressive">Impressive</option>
                        <option value="hearty">Hearty</option>
                        <option value="fun">Fun</option>
                        <option value="healthy">Healthy</option>
                        <option value="comfort">Comfort</option>
                        <option value="fancy">Fancy</option>
                        <option value="elegant">Elegant</option>
                        <option value="classic">Classic</option>
                        <option value="simple">Simple</option>
                    </select>
                </div>

                <button id="spin-btn" aria-label="Spin to find a recipe">
                    <span id="btn-text">Spin the Pantry</span>
                </button>

                <button id="reset-seen-btn" class="reset-btn" aria-label="Reset recipe suggestions history">
                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
                    </svg>
                    Reset Suggestions
                </button>
            </main>

            <div
                id="result"
                class="result-card hidden"
                aria-live="polite"
                aria-atomic="true"
                role="region"
                aria-label="Recipe result"
            ></div>

            <section id="favorites-section" class="favorites-section" aria-label="Your saved favorite recipes">
                <h2 class="favorites-title">
                    <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                    </svg>
                    Your Favorites
                </h2>
                <div id="favorites-list" class="favorites-list"></div>
                <p id="favorites-empty" class="no-match hidden">No favorites saved yet. Spin to find something you love!</p>
            </section>
            <div id="recipe-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-body">
                <div class="modal-card" id="modal-card">
                    <div id="modal-body">
                        <div class="modal-image-wrap">
                            <img id="modal-image" src="" alt="" class="modal-img hidden" />
                            <button class="modal-close-btn" id="modal-close-btn" aria-label="Close recipe modal">
                                <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                                </svg>
                            </button>
                        </div>
                        <div class="modal-content">
                            <p id="modal-category" class="modal-category"></p>
                            <h2 id="modal-title" class="modal-title"></h2>
                            <div class="modal-meta">
                                <span class="meta-time">30 mins</span>
                            </div>
                            <div class="modal-section">
                                <h3>Ingredients</h3>
                                <ul id="modal-ingredients" class="modal-ingredients-list"></ul>
                            </div>
                            <div class="modal-section">
                                <h3>Instructions</h3>
                                <ol id="modal-steps" class="modal-steps-list"></ol>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="vibes.js"></script>
        <script src="recipes.js"></script>
        <script src="app.js"></script>
    </body>
</html>
